<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <title>Track - Microservices Mastery</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1>Track Episode</h1>
        <div class="subtitle">Log your learning</div>
      </div>
      <button class="menu-btn" id="menuBtn">☰</button>
    </header>

    <div class="nav-overlay" id="navOverlay"></div>
    <nav class="nav-drawer" id="navDrawer">
      <div class="nav-header"><h2>Menu</h2></div>
      <ul class="nav-links">
        <li><a href="index.html"><span class="nav-icon">📊</span> Dashboard</a></li>
        <li><a href="episodes.html"><span class="nav-icon">📚</span> Episodes</a></li>
        <li><a href="tracker.html" class="active"><span class="nav-icon">🎯</span> Progress</a></li>
        <li><a href="reflect.html"><span class="nav-icon">📝</span> Reflect</a></li>
        <li><a href="./about.html"><span class="nav-icon">ℹ️</span> About</a></li>
      </ul>
    </nav>

    <main class="app-main">
      <form id="trackerForm">
        <div class="card">
          <div class="card-title">Episode Details</div>
          
          <div class="form-group">
            <label class="form-label">Episode</label>
            <select class="form-select" id="episodeSelect">
              <option value="">Select Episode...</option>
              <option value="1">EP 1: Hello Distributed World</option>
              <option value="2">EP 2: Adding Resilience</option>
              <option value="3">EP 3: Communication Patterns Lab</option>
              <option value="4">EP 4: The Database Split</option>
              <option value="5">EP 5: Circuit Breaker & Bulkhead</option>
              <option value="6">EP 6: API Gateway</option>
              <option value="7">EP 7: Service Discovery</option>
              <option value="8">EP 8: Observability Deep Dive</option>
              <option value="9">EP 9: Docker Compose to Kubernetes</option>
              <option value="10">EP 10: Config & Secrets Management</option>
              <option value="11">EP 11: CI/CD Pipeline</option>
              <option value="12">EP 12: Event Sourcing or CQRS</option>
              <option value="13">EP 13: Saga Pattern</option>
              <option value="14">EP 14: Service Mesh</option>
              <option value="15">EP 15: Chaos Engineering</option>
              <option value="16">EP 16: Capstone Project Start</option>
              <option value="17">EP 17: Performance Optimization</option>
              <option value="18">EP 18: Security Hardening</option>
              <option value="19">EP 19: Operational Excellence</option>
              <option value="20">EP 20: Final Review & Transfer</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-input" id="episodeDate">
          </div>

          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" id="episodeStatus">
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Reward Calculation</div>
          
          <div class="form-group">
            <label class="form-label">Base Reward (Feature works)</label>
            <input type="number" class="form-input" id="baseReward" value="50" min="0" max="100">
          </div>

          <div class="form-group">
            <label class="form-label">Pattern Rewards</label>
            <ul class="checklist">
              <li class="checklist-item">
                <input type="checkbox" id="check-deployable" data-points="20">
                <label for="check-deployable">Independently Deployable (+20)</label>
              </li>
              <li class="checklist-item">
                <input type="checkbox" id="check-error-handling" data-points="15">
                <label for="check-error-handling">Proper Error Handling (+15)</label>
              </li>
              <li class="checklist-item">
                <input type="checkbox" id="check-observability" data-points="25">
                <label for="check-observability">Observability Added (+25)</label>
              </li>
              <li class="checklist-item">
                <input type="checkbox" id="check-resilience" data-points="30">
                <label for="check-resilience">Resilience Pattern (+30)</label>
              </li>
              <li class="checklist-item">
                <input type="checkbox" id="check-db-per-service" data-points="20">
                <label for="check-db-per-service">Database Per Service (+20)</label>
              </li>
              <li class="checklist-item">
                <input type="checkbox" id="check-async" data-points="15">
                <label for="check-async">Async Communication (+15)</label>
              </li>
              <li class="checklist-item">
                <input type="checkbox" id="check-idempotency" data-points="20">
                <label for="check-idempotency">Idempotency Handled (+20)</label>
              </li>
            </ul>
          </div>

          <div class="form-group">
            <label class="form-label">Penalties</label>
            <ul class="checklist">
              <li class="checklist-item">
                <input type="checkbox" id="pen-shared-db" data-points="-80">
                <label for="pen-shared-db">Shared Database (-80)</label>
              </li>
              <li class="checklist-item">
                <input type="checkbox" id="pen-tight-coupling" data-points="-50">
                <label for="pen-tight-coupling">Tight Coupling (-50)</label>
              </li>
              <li class="checklist-item">
                <input type="checkbox" id="pen-no-health" data-points="-40">
                <label for="pen-no-health">No Health Checks (-40)</label>
              </li>
              <li class="checklist-item">
                <input type="checkbox" id="pen-hardcoded" data-points="-30">
                <label for="pen-hardcoded">Hardcoded URLs (-30)</label>
              </li>
              <li class="checklist-item">
                <input type="checkbox" id="pen-no-timeouts" data-points="-30">
                <label for="pen-no-timeouts">No Timeouts (-30)</label>
              </li>
              <li class="checklist-item">
                <input type="checkbox" id="pen-no-obs" data-points="-30">
                <label for="pen-no-obs">Missing Observability (-30)</label>
              </li>
              <li class="checklist-item">
                <input type="checkbox" id="pen-sync-chain" data-points="-40">
                <label for="pen-sync-chain">Sync Chain > 3 Services (-40)</label>
              </li>
            </ul>
          </div>

          <div class="reward-display">
            <div class="reward-value" id="totalCalculatedReward">50</div>
            <div class="reward-label">Total Reward</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Reflection</div>
          <div class="form-group">
            <label class="form-label">What worked well?</label>
            <textarea class="form-textarea" id="whatWorked" placeholder="Positive TD error - what would you do again?"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">What would you do differently? (Policy Update)</label>
            <textarea class="form-textarea" id="policyUpdate" placeholder="How does your decision-making change?"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Key Insight</label>
            <textarea class="form-textarea" id="keyInsight" placeholder="One major lesson from this episode"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Difficulty</label>
            <select class="form-select" id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
              <option value="expert">Expert</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Save Episode Log</button>
      </form>

      <div class="card">
        <div class="card-title">Episode History</div>
        <div id="episodeHistory">
          <p class="text-secondary text-center" style="padding: 1rem;">No episodes logged yet.</p>
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span class="nav-item-icon">📊</span>
        <span>Home</span>
      </a>
      <a href="episodes.html" class="nav-item">
        <span class="nav-item-icon">📚</span>
        <span>Learn</span>
      </a>
      <a href="tracker.html" class="nav-item active">
        <span class="nav-item-icon">🎯</span>
        <span>Track</span>
      </a>
      <a href="reflect.html" class="nav-item">
        <span class="nav-item-icon">📝</span>
        <span>Reflect</span>
      </a>
      <a href="./about.html" class="nav-item">
        <span class="nav-item-icon">ℹ️</span>
        <span>About</span>
      </a>
    </nav>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Set today's date
      document.getElementById('episodeDate').valueAsDate = new Date();
      
      // Calculate reward in real-time
      calculateReward();
      document.querySelectorAll('input[type="checkbox"], #baseReward').forEach(el => {
        el.addEventListener('change', calculateReward);
        el.addEventListener('input', calculateReward);
      });
      
      // Form submit
      document.getElementById('trackerForm').addEventListener('submit', (e) => {
        e.preventDefault();
        saveEpisodeLog();
      });
      
      renderEpisodeHistory();
    });
  </script>
</body>
</html>
